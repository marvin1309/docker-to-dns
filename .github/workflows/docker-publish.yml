name: Docker Image CI

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Read version from version.py
      id: version
      run: echo "version=$(python3 -c 'import version; print(version.get_version())')" >> "$GITHUB_OUTPUT"

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        build-args: |
          VERSION=${{ steps.version.outputs.version }}
        tags: |
          ghcr.io/marvin1309/docker-to-dns:latest
          ghcr.io/marvin1309/docker-to-dns:${{ steps.version.outputs.version }}
